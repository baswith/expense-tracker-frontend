<div class="toast-stack" aria-live="polite" aria-atomic="false">
  @for (t of toast.toasts; track trackById($index, t)) {
    <div class="toast-item" [class]="'toast-' + t.type" [id]="'toast-' + t.id">
      <span class="toast-icon">{{ icon(t.type) }}</span>
      <span class="toast-msg">{{ t.message }}</span>
      <button class="toast-close" (click)="toast.dismiss(t.id)" aria-label="Dismiss">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="toast-progress" [class]="'progress-' + t.type"></div>
    </div>
  }
</div>
