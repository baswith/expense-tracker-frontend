<nav class="navbar">
  <div class="navbar-left">
    <button class="menu-btn btn btn-ghost btn-icon" (click)="toggleSidebar.emit()" id="sidebar-toggle-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="brand">
      <span class="brand-name">FinTrack</span>
    </div>
  </div>

  <div class="navbar-right">
    <button class="user-chip" type="button" (click)="openProfile.emit()" id="profile-open-btn" title="Open profile">
      <div class="user-avatar">{{ userInitial }}</div>
      <span class="user-email hide-mobile">{{ userEmail }}</span>
    </button>
    <button class="btn btn-ghost btn-icon" (click)="logout()" id="logout-btn" title="Logout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16,17 21,12 16,7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>
