<div class="add-transaction-page">
  <div class="form-card card animate-in">

    <!-- Back -->
    <div class="back-nav">
      <a routerLink="/transactions" class="back-link" id="back-to-transactions">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Transactions
      </a>
    </div>

    <!-- Header -->
    <div class="form-header">
      <h1 class="form-title">{{ pageTitle }}</h1>
      <p class="form-subtitle">Fill in the details below</p>
    </div>

    @if (loadingData) {
      <div class="loading-state">
        <div class="spinner" style="width:28px;height:28px;border-width:2px;color:var(--text-muted)"></div>
        <p>Loading transaction...</p>
      </div>
    } @else {

      <!-- Type Toggle (only when adding new) -->
      @if (!editId) {
        <div class="type-toggle" id="type-toggle">
          <button
            class="type-btn"
            [class.active-expense]="form.expenseType === 'EXPENSE'"
            (click)="toggleType('EXPENSE')"
            id="toggle-expense">
            <span>Expense</span>
          </button>
          <button
            class="type-btn"
            [class.active-income]="form.expenseType === 'INCOME'"
            (click)="toggleType('INCOME')"
            id="toggle-income">
            <span>Income</span>
          </button>
        </div>
      }

      <form (ngSubmit)="onSubmit()" id="add-transaction-form">
        <!-- Amount -->
        <div class="form-group">
          <label class="form-label" for="tx-amount">Amount</label>
          <div class="amount-wrapper">
            <span class="currency-symbol" style="left: 8px; font-size: 0.8rem; font-weight: normal; color: var(--text-muted);">{{ auth.getCurrency() }}</span>
            <input
              type="number"
              id="tx-amount"
              class="form-control amount-input"
              placeholder="0.00"
              [(ngModel)]="form.amount"
              name="amount"
              min="0.01"
              step="0.01"
              style="padding-left: 48px;"
              required>
          </div>
        </div>

        <!-- Category -->
        <div class="form-group">
          <label class="form-label">Category</label>
          <div class="category-grid" id="category-grid">
            @for (cat of categories; track cat) {
              <button
                type="button"
                class="cat-chip"
                [class.selected-income]="form.category === cat && form.expenseType === 'INCOME'"
                [class.selected-expense]="form.category === cat && form.expenseType === 'EXPENSE'"
                (click)="selectCategory(cat)"
                [id]="'cat-' + cat">
                <span>{{ cat }}</span>
              </button>
            }
          </div>
        </div>

        @if (usesCustomCategory) {
          <div class="form-group custom-category-group">
            <label class="form-label" for="tx-custom-category">Custom Category</label>
            <input
              type="text"
              id="tx-custom-category"
              class="form-control"
              placeholder="Enter category name"
              [(ngModel)]="customCategory"
              name="customCategory"
              maxlength="60"
              required>
          </div>
        }
        <!-- Description -->
        <div class="form-group">
          <label class="form-label" for="tx-description">
            Description <span class="optional">(optional)</span>
          </label>
          <input
            type="text"
            id="tx-description"
            class="form-control"
            placeholder="What was this for?"
            [(ngModel)]="form.description"
            name="description"
            maxlength="200">
        </div>

        <!-- Date -->
        <div class="form-group">
          <label class="form-label" for="tx-date">Date</label>
          <input
            type="date"
            id="tx-date"
            class="form-control"
            [(ngModel)]="form.date"
            name="date"
            required>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <a routerLink="/transactions" class="btn btn-ghost" id="cancel-btn">Cancel</a>
          <button
            type="submit"
            class="btn btn-primary btn-lg"
            [disabled]="loading"
            id="submit-transaction-btn">
            @if (loading) {
              <span class="spinner"></span>
              <span>Saving...</span>
            } @else {
              <span>{{ editId ? 'Update Transaction' : (form.expenseType === 'INCOME' ? 'Add Income' : 'Add Expense') }}</span>
            }
          </button>
        </div>
      </form>
    }
  </div>
</div>
